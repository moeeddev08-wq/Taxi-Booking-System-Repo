<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Wizz Cars Godalming Admin</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="topbar">
        <div>
            <div class="topbar-brand">Wizz Cars Godalming</div>
            <div class="topbar-sub" id="userEmail">Admin Dashboard</div>
        </div>
        <button class="logout-btn" id="logoutBtn">Log out</button>
    </div>

    <main>
        <div class="section-head">
            <h1>Bookings</h1>
            <div style="display:flex; align-items:center; gap:12px;">
                <span class="count" id="bookingCount"></span>
                <button class="refresh-btn" id="refreshBtn">Refresh</button>
            </div>
        </div>

        <div class="card">
            <div id="bookingsArea">
                <div class="state-msg">Loading bookings...</div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
